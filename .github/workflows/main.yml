name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: si12-ship-it
          outputs: |
            "dist/snake.svg?palette=github-dark&color_snake=%23ff69b4&color_dots=%231a001a,%23330033,%23660066,%23990099,%23ff69b4"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4

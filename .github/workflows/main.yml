name: Generate Snake

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: si12-ship-it
          outputs: dist/snake.svg

      - uses: actions/upload-artifact@v4
        with:
          name: snake
          path: dist
